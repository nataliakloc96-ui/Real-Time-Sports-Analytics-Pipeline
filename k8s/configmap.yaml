apiVersion: v1
kind: ConfigMap
metadata:
  name: pipeline-config
  namespace: default
  labels:
    app: sports-pipeline
data:
  KAFKA_BOOTSTRAP_SERVERS: "sports-kafka:9092"
  KAFKA_TOPIC: "raw_match_events"
  KAFKA_DLQ_TOPIC: "raw_match_events_dlq"
  BRONZE_OUTPUT_PATH: "/data/bronze/match_events"
  SILVER_OUTPUT_PATH: "/data/silver/match_events"